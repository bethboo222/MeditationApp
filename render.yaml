services:
  # Backend Java Service
  - type: web
    name: meditation-app-backend
    env: java
    buildCommand: mvn clean package
    startCommand: java -jar target/MeditationApp.war
    envVars:
      - key: PORT
        value: 8080

  # Frontend React Service
  - type: web
    name: meditation-app-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://meditation-app-backend.onrender.com
